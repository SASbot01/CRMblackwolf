services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: blackwolf_crm
      POSTGRES_USER: blackwolf
      POSTGRES_PASSWORD: blackwolf_secure_2026
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blackwolf -d blackwolf_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://blackwolf:blackwolf_secure_2026@db:5432/blackwolf_crm
      JWT_SECRET: bw-crm-secret-key-change-in-production-2026
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
